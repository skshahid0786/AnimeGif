<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlissCraft | Premium API</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-card">
        <h1>BlissCraft <span class="highlight">API</span></h1>
        <p>High-quality anime assets for developers.</p>
        
        <div class="image-container">
            <div id="skeleton" class="skeleton"></div>
            <img id="waifu-img" src="" alt="Result" style="display:none;">
        </div>

        <div class="controls">
            <button onclick="fetchImage()" id="gen-btn">Generate Asset</button>
            <p class="api-hint">Source: <code>waifu.pics/api</code></p>
        </div>
    </div>

    <script>
        async function fetchImage() {
            const img = document.getElementById('waifu-img');
            const skeleton = document.getElementById('skeleton');
            const btn = document.getElementById('gen-btn');

            btn.disabled = true;
            btn.innerText = "Fetching...";
            img.style.display = "none";
            skeleton.style.display = "block";

            try {
                // Direct call to the source since GitHub Pages has no backend
                const res = await fetch('https://api.waifu.pics/sfw/waifu');
                const data = await res.json();
                
                img.src = data.url;
                img.onload = () => {
                    skeleton.style.display = "none";
                    img.style.display = "block";
                    btn.disabled = false;
                    btn.innerText = "Generate Asset";
                };
            } catch (e) {
                console.error(e);
                alert("Connection Error. Try again.");
                btn.disabled = false;
                btn.innerText = "Generate Asset";
            }
        }
        window.onload = fetchImage;
    </script>
</body>
</html>
